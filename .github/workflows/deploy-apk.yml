name: 发布正式版 APK

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest

    outputs:
      version_code: ${{ steps.version.outputs.version_code }}
      version_name: ${{ steps.version.outputs.version_name }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      apk_name: ${{ steps.version.outputs.apk_name }}
      apk_url: ${{ steps.download.outputs.apk_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验手动发布分支
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "正式版发布只能手动从 main 分支运行，当前分支：${{ github.ref_name }}" >&2
            exit 1
          fi
          echo "手动发布分支校验通过：main"

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 校验版本与更新日志
        shell: bash
        run: python scripts/release/check_release_ready.py

      - name: 读取版本号
        id: version
        shell: bash
        run: python scripts/release/read_version.py --github-output "$GITHUB_OUTPUT"

      - name: 生成默认更新下载地址
        id: download
        shell: bash
        env:
          UPDATE_DOWNLOAD_URL: ${{ vars.UPDATE_DOWNLOAD_URL || 'https://oplist.lastudio.cc/Eklose_release' }}
        run: |
          set -euo pipefail
          apk_url="${UPDATE_DOWNLOAD_URL}"
          echo "apk_url=${apk_url}" >> "$GITHUB_OUTPUT"
          echo "默认更新下载地址：${apk_url}"

      - name: 生成发布说明
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/extract_changelog.py \
            --version "${{ steps.version.outputs.version_name }}" \
            --apk-url "${{ steps.download.outputs.apk_url }}" \
            --release-notes release_notes.md \
            --changelog-output current_changelog.md

      - name: 还原签名文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/eklose-signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/eklose-signing/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/eklose-signing/release.keystore" >> "$GITHUB_ENV"
          echo "release keystore 已写入临时目录。"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: 授权 Gradle Wrapper
        shell: bash
        run: chmod +x ./gradlew

      - name: 构建正式版 APK
        shell: bash
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 整理 APK 产物
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          apk_source="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk_source" ]; then
            apk_source="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          fi
          if [ -z "${apk_source:-}" ] || [ ! -f "$apk_source" ]; then
            echo "没有找到 release APK。" >&2
            exit 1
          fi
          mkdir -p release
          apk_target="release/${{ steps.version.outputs.apk_name }}"
          cp "$apk_source" "$apk_target"
          echo "apk_path=${apk_target}" >> "$GITHUB_OUTPUT"
          echo "APK 已重命名为 ${apk_target}。"

      - name: 生成发布审批摘要
        shell: bash
        run: |
          set -euo pipefail
          apk_path="${{ steps.artifact.outputs.apk_path }}"
          apk_size="$(du -h "$apk_path" | cut -f1)"
          apk_sha256="$(sha256sum "$apk_path" | cut -d ' ' -f1)"
          {
            echo "# 发布审批摘要"
            echo
            echo "## 构建结果"
            echo "- 编译状态：成功"
            echo "- APK 文件：${{ steps.version.outputs.apk_name }}"
            echo "- APK 大小：${apk_size}"
            echo "- APK SHA256：\`${apk_sha256}\`"
            echo
            echo "## 版本信息"
            echo "- versionName：${{ steps.version.outputs.version_name }}"
            echo "- versionCode：${{ steps.version.outputs.version_code }}"
            echo "- Git 标签：${{ steps.version.outputs.tag_name }}"
            echo "- 默认更新下载地址：${{ steps.download.outputs.apk_url }}"
            echo
            echo "## 工作流信息"
            echo "- 触发方式：${{ github.event_name }}"
            echo "- 分支：${{ github.ref_name }}"
            echo "- 提交：\`${{ github.sha }}\`"
            echo "- 构建编号：${{ github.run_number }}"
            echo
            echo "## 本次更新日志"
            echo
            cat current_changelog.md
          } > release_review.md
          cat release_review.md >> "$GITHUB_STEP_SUMMARY"

      - name: 上传待发布产物
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            ${{ steps.artifact.outputs.apk_path }}
            release_notes.md
            current_changelog.md
            release_review.md
          if-no-files-found: error

  publish:
    name: 手动确认发布 Eklose v${{ needs.build.outputs.version_name }}
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: release
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验发布密钥
        shell: bash
        run: |
          set -euo pipefail
          required_secrets=(
            "CONFIG_GITHUB_TOKEN"
            "GITEE_USERNAME"
            "GITEE_TOKEN"
            "LANZOU_USERNAME"
            "LANZOU_PASSWORD"
          )
          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name:-}" ]; then
              echo "缺少 GitHub Secret：${secret_name}，无法发布。" >&2
              exit 1
            fi
          done
          echo "发布密钥校验通过。"
        env:
          CONFIG_GITHUB_TOKEN: ${{ secrets.CONFIG_GITHUB_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          LANZOU_USERNAME: ${{ secrets.LANZOU_USERNAME }}
          LANZOU_PASSWORD: ${{ secrets.LANZOU_PASSWORD }}

      - name: 下载待发布产物
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release-package

      - name: 准备待发布文件
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find release-package -name "${{ needs.build.outputs.apk_name }}" -type f | head -n 1)"
          if [ -z "${apk_path:-}" ] || [ ! -f "$apk_path" ]; then
            echo "没有找到待发布 APK：${{ needs.build.outputs.apk_name }}" >&2
            find release-package -maxdepth 3 -type f >&2
            exit 1
          fi
          echo "apk_path=${apk_path}" >> "$GITHUB_OUTPUT"
          release_notes_path="$(find release-package -name release_notes.md -type f | head -n 1)"
          changelog_path="$(find release-package -name current_changelog.md -type f | head -n 1)"
          review_path="$(find release-package -name release_review.md -type f | head -n 1)"
          if [ -z "${release_notes_path:-}" ] || [ -z "${changelog_path:-}" ] || [ -z "${review_path:-}" ]; then
            echo "没有找到发布说明、当前更新日志或审批摘要。" >&2
            find release-package -maxdepth 3 -type f >&2
            exit 1
          fi
          cp "$release_notes_path" release_notes.md
          cp "$changelog_path" current_changelog.md
          cp "$review_path" release_review.md

      - name: 安装蓝奏云上传依赖
        shell: bash
        run: python -m pip install --upgrade requests requests-toolbelt

      - name: 上传 APK 到蓝奏云
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/upload_lanzou.py \
            --file "${{ steps.artifact.outputs.apk_path }}" \
            --folder-name "${LANZOU_FOLDER_NAME}"
        env:
          LANZOU_USERNAME: ${{ secrets.LANZOU_USERNAME }}
          LANZOU_PASSWORD: ${{ secrets.LANZOU_PASSWORD }}
          LANZOU_FOLDER_NAME: ${{ vars.LANZOU_FOLDER_NAME || 'eklose' }}

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag_name }}
          name: Eklose v${{ needs.build.outputs.version_name }}
          body_path: release_notes.md
          files: ${{ steps.artifact.outputs.apk_path }}
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 同步远程配置仓库
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/update_remote_config.py \
            --version-code "${{ needs.build.outputs.version_code }}" \
            --version-name "${{ needs.build.outputs.version_name }}" \
            --apk-url "${{ needs.build.outputs.apk_url }}" \
            --message-file current_changelog.md \
            --local-config-file config/config.json \
            --source-changelog-file update.md
        env:
          CONFIG_GITHUB_TOKEN: ${{ secrets.CONFIG_GITHUB_TOKEN }}
          CONFIG_GITHUB_REPO: ${{ vars.CONFIG_GITHUB_REPO || 'laststudio/Fe_config' }}
          CONFIG_GITHUB_BRANCH: ${{ vars.CONFIG_GITHUB_BRANCH || 'main' }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_CONFIG_REPO: ${{ vars.GITEE_CONFIG_REPO || 'qiuqiqiuqid/fe_config' }}
          GITEE_CONFIG_BRANCH: ${{ vars.GITEE_CONFIG_BRANCH || 'master' }}
          REMOTE_CONFIG_FILE: ${{ vars.REMOTE_CONFIG_FILE || 'eklose_config.json' }}
          REMOTE_CHANGELOG_FILE: ${{ vars.REMOTE_CHANGELOG_FILE || 'eklose_update.md' }}
